name: Mise à jour du Digest Quotidien

on:
  schedule:
    # S'exécute tous les jours à 6h00 UTC (8h00 heure de Paris en été)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permet de déclencher la mise à jour manuellement depuis l'interface GitHub

jobs:
  update-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour pousser la mise à jour de data.json sur le dépôt

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lancer la génération du digest d'actualités
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python fetch_news.py

      - name: Commiter et pousser les modifications
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          # On ne commit que s'il y a des changements (pour éviter de faire échouer le build si aucun article n'est nouveau)
          git diff-index --quiet HEAD || git commit -m "chore: mise à jour automatique du digest [skip ci]"
          git push origin main
